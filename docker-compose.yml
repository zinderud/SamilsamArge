#   docker-compose build
#   docker-compose up

version: "3.7"

services:
  web:
    container_name: "argebackend"
    image: "argebackend"
    build:
      context: ./argebackend
      dockerfile: Dockerfile
    volumes:
      - ./argebackend:/var/www/argebackend
    ports:
      - "5000:5000"
      - "3001:3001"

    depends_on:
      - db
    networks:
      - app-network
  db:
    image: "microsoft/mssql-server-linux"
    environment:
      SA_PASSWORD: "YourSTRONG!Passw0rd"
      ACCEPT_EULA: "Y"
    networks:
      - app-network
    volumes:
      - local_data/var/opt/mssql/data
  nginx:
    container_name: frontend
    image: frontend
    build:
      context: ./frontend
      dockerfile: nginx.dockerfile
    ports:
      - "80:80"
      - "443:443"

    networks:
      - app-network
networks:
  app-network:
    driver: bridge
volumes:
  local_data: {}
