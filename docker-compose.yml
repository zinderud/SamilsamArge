#   docker-compose build
#   docker-compose up

version: "3.7"

services:
  web:
    container_name: "argebackend"
    image: "argebackend"
    build:
      context: ./argebackend
      dockerfile: Dockerfile
 
 
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=https://+:443;http://+:5000
      - ASPNETCORE_Kestrel__Certificates__Default__Password=localhost
      - ASPNETCORE_Kestrel__Certificates__Default__Path=/https/aspnetapp.pfx
    volumes:
      - ~/.aspnet/https:/https:ro
      - ./argebackend:/var/www/argebackend
    ports:
      - "5000:5000"
      - "5001:5001"
    depends_on:
      - "postgres"
    networks:
      - app-network
  postgres:
    container_name: "postgres"
    image: postgres
    environment:
      POSTGRES_PASSWORD: password
      POSTGRES_USERNAME: postgres
    networks:
      - app-network
    volumes:
      - local_postgres_data:/var/lib/postgresql/data
  nginx:
    container_name: argefrontend
    image: argefrontend
    build:
      context: ./argefrontend
      dockerfile: nginx.dockerfile
    ports:
      - "80:80"
      - "443:443"

    networks:
      - app-network
  omnidb:
    container_name: omnidb
    image: omnidb
    privileged: true
    user: root
    build:
      context: ./omnidb
      dockerfile: Dockerfile
    volumes:
      - $PWD/omnidb_data:/etc/omnidb:Z
    ports:
      - "25482:25482"
      - "8080:8080"

    networks:
      - app-network
networks:
  app-network:
    driver: bridge
volumes:
  local_postgres_data: {}
