 <ng-template [appHasRole]="'User' || 'Manager' ||'Admin'">


  
  <p class="ort">Kullanıcı Giriş Ekranı </p>
    
  <div class="row">

    <div class="col-12 col-md-4">
      <ngx-call-action-card title="Basvuru Listele" icon="brightness_5" link="/user/basvuru-list" linkTitle="Görüntüle">
      </ngx-call-action-card>
    </div>
    <div class="col-12 col-md-4">
      <ngx-call-action-card title="Basvuru ekle" icon="attach_file" link="/basvuru/add" linkTitle="Görüntüle">
      </ngx-call-action-card>
    </div>
    <div class="col-12 col-md-4">
      <ngx-call-action-card title="Ozgecmis ekle" icon="attach_file" link="/ozgecmis/add" linkTitle="Görüntüle">
      </ngx-call-action-card>
    </div>
  </div>
</ng-template>

<ng-template [appHasRole]="'Manager' ||'Admin' ">
  
    
  <p class="ort"> Giriş Ekranı </p>

  <div class="row">
    <div class="col-12 col-md-4">
      <ngx-call-action-card title="Kontrol list" icon="brightness_5" type="pantone" link="/manager/kontrol-list"
        linkTitle="Görüntüle">
      </ngx-call-action-card>
    </div>
    <div class="col-12 col-md-4">
      <ngx-call-action-card title="Basvuru ekle" icon="attach_file" link="/basvuru/add" linkTitle="Görüntüle">
      </ngx-call-action-card>
    </div>
  </div>

</ng-template>




<ng-template [appHasRole]="'Admin'">
 
  <p class="ort"> Admin Giriş Ekranı </p>

  <app-basvuru-count-stats></app-basvuru-count-stats>
  <div class="row">
    <div class="col-12 col-md-4">
      <ngx-call-action-card title="Kontrol Atama" icon="brightness_5" type="pantone" link="/admin/kontrol-atama"
        linkTitle="Görüntüle">
      </ngx-call-action-card>
    </div>
  
    <div class="col-12 col-md-4">
      <ngx-call-action-card title="Kontrol list" icon="brightness_5" type="pantone" link="/admin/kontrol-list"
        linkTitle="Görüntüle">
      </ngx-call-action-card>
    </div>
   
    <div class="col-12 col-md-4">
      <ngx-call-action-card title="Başvuru  İnceleme Listesi" icon="wc" type="pantone" link="/inceleme"
        linkTitle="Görüntüle">
      </ngx-call-action-card>
    </div>

    <div class="col-12 col-md-4">
      <ngx-call-action-card title="Başvuru  Bitiş Tarihi" icon="wc" type="pantone" link="/admin/projebitis"
        linkTitle="Görüntüle">
      </ngx-call-action-card>
    </div>
  </div>
  

</ng-template>
