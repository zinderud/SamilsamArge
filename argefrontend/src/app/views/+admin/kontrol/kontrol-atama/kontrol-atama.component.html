<div *ngIf="loading">
    <mat-progress-bar color="warn"></mat-progress-bar>
  </div>
  
  <form [formGroup]="searchForm" #f="ngForm" (ngSubmit)="onFilter()" class="form">
  
    <div class="container padding-15">
  
      <div class="item-70 container">
  
        <div class="item-40">
          <mat-form-field class="full-width">
            <input matInput type="text" placeholder="Başvuru Filtrele" formControlName="durum" />
          </mat-form-field>
        </div>
  
        <div class="item-25" style="margin-top: 10px;">
  
          <button mat-raised-button color="primary" type="submit" [disabled]="!searchForm.valid" aria-label="search">
            <mat-icon>search</mat-icon>
            <span>filtre</span>
          </button>
  
          <button mat-raised-button color="accent" type="button" (click)="onClear()" aria-label="clear"
            [disabled]="searchForm.valid || searchForm.value.durum === ''">
            <mat-icon>clear</mat-icon>
            <span>temizle</span>
          </button>
        </div>
  
      </div>
  
  
      <div class="item-30" style="margin-top: 10px;">
        <button mat-raised-button color="primary" type="button" routerLink="/basvuru/add" aria-label="add">
          <mat-icon>add</mat-icon>
          <span> ekle </span>
        </button>
  
  
      </div>
  
    </div>
  
  </form>
  
  <div *ngIf="data.length === 0" class="container">
    <div class="item">
      <h1 class="mat-h1">icerik yok</h1>
    </div>
  </div>
  
  <div [hidden]="data.length === 0" class="table mat-elevation-z8">
    <div class="loading-shade" *ngIf="loading"></div>
  
    <div class="table-container">
  
      <table mat-table [dataSource]="data" class="table" matSort matSortActive="name" matSortDisableClear
        matSortDirection="asc">

            <!-- Position Column -->
    <ng-container matColumnDef="checked">
        <mat-header-cell *matHeaderCellDef>Check</mat-header-cell>
        <mat-cell *matCellDef="let element"> 
          <mat-checkbox [(ngModel)]="element.checked"></mat-checkbox>
        </mat-cell>
      </ng-container>
  
  
        <!-- Id Column -->
        <ng-container matColumnDef="userId">
          <th mat-header-cell *matHeaderCellDef mat-sort-header disableClear>
            Kullancı Ad Soyad
          </th>
          <td mat-cell *matCellDef="let row">{{row.user.firstname+ " "+row.user.lastname}}</td>
  
        </ng-container>
  
        <!-- Name Column -->
        <ng-container matColumnDef="basvuruNo">
          <th mat-header-cell *matHeaderCellDef mat-sort-header disableClear>
            Basvuru No
          </th>
          <td mat-cell *matCellDef="let row">{{row.basvuruNo}}</td>
        </ng-container>
  
        <!-- tarih Column -->
        <ng-container matColumnDef="tarih">
          <th mat-header-cell *matHeaderCellDef mat-sort-header disableClear>
            tarih
          </th>
          <td mat-cell *matCellDef="let row">{{row.tarih|date}}</td>
        </ng-container>
  
        <!-- durum Column -->
        <ng-container matColumnDef="durum">
          <th mat-header-cell *matHeaderCellDef mat-sort-header disableClear>
            durum
          </th>
          <td mat-cell [ngStyle]="{'color':getColor(row.durum)}" *matCellDef="let row">{{row.durum}}</td>
        </ng-container>
  
        <!-- BasvuruTuru Column -->
        <ng-container matColumnDef="basvuruTuru">
          <th mat-header-cell *matHeaderCellDef mat-sort-header disableClear>
            basvuruTuru
          </th>
          <td mat-cell *matCellDef="let row">{{row.basvuruTuru}}</td>
        </ng-container>
  
        <!-- Önizleme Column -->
  
        <ng-container matColumnDef="onizleme">
          <th mat-header-cell *matHeaderCellDef>
            Önizleme
          </th>
          <td mat-cell *matCellDef="let row">
            <a mat-button (click)="onOnizleme(row)" color="warn">
              <mat-icon>link</mat-icon>
            </a>
          </td>
        </ng-container>
        <!-- Önizleme Column -->
  
 
  
  
        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <mat-row *matRowDef="let row; columns: displayedColumns;" [ngClass]="{hovered: row.hovered, highlighted: row.highlighted}" (click)="row.highlighted = !row.highlighted" (mouseover)="row.hovered = true" (mouseout)="row.hovered = false"></mat-row>
      </table>
    </div>
  
    <mat-paginator [length]="resultsLength" [pageSize]="20"></mat-paginator>
  </div>
