 

    <nb-card accent="danger">
        <nb-card-header>Not Ekle</nb-card-header>
        <nb-card-body>
            <form [formGroup]="notform" class="form">




                <!-- durum -->
                <div class="row">
                    <div class="col-sm-12">
                        <div class="row">
                            <div class="col-sm-12">
                                <mat-form-field class="full-width " appearance="outline">
                                    <mat-label>notunuz</mat-label>
                                    <textarea matInput required type="text" placeholder="notunuz"
                                        formControlName="not"></textarea>
                                </mat-form-field>


                            </div>
                        </div>
                    </div>
                </div>
                <!-- durum -->



                <div class="row">
                    <button type="submit" nbButton status="primary" [disabled]="!notform.valid"
                        (click)="onNotCreate()">Not ekle</button>
                    <button type="submit" nbButton status="primary" (click)="onRefresh()">Yeni not ekle</button>
                </div>

            </form>

        </nb-card-body>
    </nb-card>
