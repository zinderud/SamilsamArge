
<nb-card class="inline-form-card">
    <nb-card-header>Basvuru Form</nb-card-header>
    <nb-card-body>
      <form [formGroup]="form"  class="form">
  
    
  
        <div class="row">
         
          <div class="col-md-12 col-lg-6">
            <app-arastirma-bir [form]="form.get('arastirmaBir')"></app-arastirma-bir>
          </div>
  
        </div>
  
   
        <div class="row">
  
  
          <div class="col-sm-12">
            <mat-form-field class="full-width" appearance="outline">
              <mat-label>Sürekli adres</mat-label>
              <input matInput type="text" placeholder="güncel adres " formControlName="liveAddress" />
            </mat-form-field>
  
          </div>
        </div>
  
  
   
  
  
  
  
   
  
     <div class="row"> {{this.form.value| json}}</div>  
      </form>
    </nb-card-body>
  </nb-card>
