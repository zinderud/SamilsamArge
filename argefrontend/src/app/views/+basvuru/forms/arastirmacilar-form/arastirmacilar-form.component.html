<nb-card accent="danger">
    <nb-card-header>ARAŞTIRMACILAR</nb-card-header>
    <nb-card-body>
        <form [formGroup]="aform" #f="ngForm" class="form">
            <!--  adı -->
            <div class="row">
                <div class="col-sm-12">

                    <mat-form-field class="full-width " appearance="outline">
                        <mat-label> adı</mat-label>
                        <input matInput required type="text" placeholder=" adı" formControlName="ad" />
                    </mat-form-field>
                </div>
            </div>
            <!--  adı -->

            <!--  Soyadı -->
            <div class="row">
                <div class="col-sm-12">

                    <mat-form-field class="full-width" appearance="outline">
                        <mat-label> Soyadı</mat-label>
                        <input matInput required type="text" placeholder=" Soyadi" formControlName="soyad" />
                    </mat-form-field>
                </div>
            </div>
            <!--  Soyadı -->
            <!-- unvan -->
            <div class="row">
                <div class="col-sm-12">

                    <mat-form-field class="full-width " appearance="outline">
                        <mat-label>unvan</mat-label>
                        <input matInput required type="text" placeholder="unvan" formControlName="unvan" />
                    </mat-form-field>
                </div>
            </div>
            <!-- unvan -->
            <!-- uzmanlikAlani -->
            <div class="row">
                <div class="col-sm-12">

                    <mat-form-field class="full-width " appearance="outline">
                        <mat-label>uzmanlikAlani</mat-label>
                        <input matInput required type="text" placeholder="uzmanlikAlani"
                            formControlName="uzmanlikAlani" />
                    </mat-form-field>
                </div>
            </div>
            <!-- uzmanlikAlani -->
            <!-- isAdresi -->
            <div class="row">
                <div class="col-sm-12">

                    <mat-form-field class="full-width " appearance="outline">
                        <mat-label>isAdresi</mat-label>
                        <input matInput required type="text" placeholder="isAdresi" formControlName="isAdresi" />
                    </mat-form-field>
                </div>
            </div>
            <!-- isAdresi -->
            <!-- eposta -->
            <div class="row">
                <div class="col-sm-12">
                    <mat-form-field class="full-width" appearance="outline">
                        <mat-label>email</mat-label>
                        <input matInput required type="text" placeholder="eposta" formControlName="eposta" />
                    </mat-form-field>
                </div>
            </div>
            <!-- eposta -->

            <!-- faks -->
            <div class="row">
                <div class="col-sm-12">

                    <mat-form-field class="full-width " appearance="outline">
                        <mat-label>faks</mat-label>
                        <input matInput required type="text" placeholder="faks" formControlName="faks" />
                    </mat-form-field>
                </div>
            </div>
            <!-- faks -->

        </form>

    </nb-card-body>
</nb-card>
