<div class="container">
    <div class="loading">
        <mat-progress-bar value="indeterminate" *ngIf="loading" color="warn"></mat-progress-bar>
    </div>
</div>
<br />
<div class="container">
    <div class="item">

        <div class="mat-elevation-z8">
            <form [formGroup]="forgotForm" #f="ngForm" (ngSubmit)="onForgot()" class="form">
                <mat-card class="mes-card">
                    <mat-toolbar>
                        <mat-card-header>
                            <h1 class="mat-h1">Kayıt Ol</h1>
                        </mat-card-header>
                    </mat-toolbar>

                    <br />

                    <mat-card-content>



                        <mat-form-field class="full-width">
                            <input matInput required type="text" placeholder="email" formControlName="email" />
                        </mat-form-field>






                    </mat-card-content>
                    <mat-card-actions>
                        <button mat-raised-button color="primary" type="submit" [disabled]="!forgotForm.valid  "
                            aria-label="forgot">
                            <mat-icon>add</mat-icon>
                            <span>gönder</span>
                        </button>

                    </mat-card-actions>
                </mat-card>
            </form>
        </div>
    </div>
</div>
