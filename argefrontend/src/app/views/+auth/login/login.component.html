<div class="limiter">
  <div class="container-login100">
    <div class="wrap-login100">
      <form [formGroup]="loginForm" #f="ngForm" (ngSubmit)="onLogin()" class="login100-form validate-form">
        <span class="login100-form-title  ">
          Giriş Ekranı
        </span>

        <div class="wrap-input100  validate-input m-b-20" data-validate="Type user name">

          <input class="input100 " required type="text" placeholder="Email Giriniz" formControlName="email">

          <span class="focus-input100"></span>
        </div>
        <div class="wrap-input100  validate-input m-b-20" data-validate="Type password">

          <input class="input100 " history="false" required [type]="hide ? 'password' : 'text'"
            placeholder="Şifre Giriniz" formControlName="pass">


          <span class="focus-input100"></span>
        </div>

        <div class="container-login100-form-btn">
          <button mat-raised-button color="primary" class="login100-form-btn" type="submit"
            [disabled]="!loginForm.valid" aria-label="login">
            <mat-icon>lock</mat-icon>
            <span>Giriş</span>
          </button>
        </div>



        <div class="w-full text-center p-t-27 p-b-239">
          <a class="txt2" routerLink="/auth/register">
            Kayıt ol
          </a>
        </div>
      </form>

      <div class="login100-more"
        style="background-image: url('https://images.pexels.com/photos/1591447/pexels-photo-1591447.jpeg?auto=compress&cs=tinysrgb&h=750&w=1260);">
      </div>
    </div>
  </div>
</div>
