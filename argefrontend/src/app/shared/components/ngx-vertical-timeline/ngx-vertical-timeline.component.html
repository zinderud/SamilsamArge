<div class="timeline">
  <div class="timeline__event  animated fadeInUp delay-3s timeline__event--type1" *ngFor="let item of list; let i = index" >
    <div class="timeline__event__icon ">
      <p>{{i}}</p>
      <div class="timeline__event__date">
        {{item?.title}}
      </div>
    </div>
    <div class="timeline__event__content ">
      <div class="timeline__event__title">
         Kullanıcı: {{item?.label}}  **   Durum: {{item?.durum}}
      </div>
      <div class="timeline__event__description">
        <p> Not : {{item?.content}}</p>
      </div>
    </div>
  </div>
