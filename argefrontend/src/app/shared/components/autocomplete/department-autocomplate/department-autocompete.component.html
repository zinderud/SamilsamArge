 

<mat-form-field class="full-width" appearance="outline">
  <mat-label>Departman  
  </mat-label>
 
<input type="text"  placeholder="Bölüm"  matInput [formControl]="departmentId" [matAutocomplete]="auto"   >
<mat-autocomplete #auto="matAutocomplete"  >
  <mat-option *ngFor="let option of filteredOptions | async" [(value)]="option.id">
     <span>{{option.id}}</span>    -   <span>{{option.name}}</span>
  </mat-option>
</mat-autocomplete>
</mat-form-field>
